name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm install
      - run: python3 -m unittest discover -s tests -v
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
